<div class="container my-4">
  <a class="text-decoration-none" href="/event-dashboard">« Back to Event Dashboard</a>

  <h2 class="mt-3 mb-4">Manage Event Accounts</h2>

  <!-- Message Display -->
  <div *ngIf="message" class="alert" [class.alert-success]="messageType === 'success'" [class.alert-danger]="messageType === 'error'" role="alert">
    {{ message }}
  </div>

  <div class="row">
    <!-- Account Form -->
    <div class="col-md-5">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">{{ isEditing ? 'Edit Account' : 'Create New Account' }}</h5>
        </div>
        <div class="card-body">
          <form [formGroup]="createAccountForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" placeholder="Enter username" formControlName="username">
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">{{ isEditing ? 'New Password (leave blank to keep current)' : 'Password' }}</label>
              <input [type]="passwordVisible ? 'text' : 'password'" class="form-control" id="password" placeholder="Password" formControlName="password">
            </div>
            <div class="mb-3">
              <label for="reEnterPassword" class="form-label">Re-enter Password</label>
              <input [type]="passwordVisible ? 'text' : 'password'" class="form-control" id="reEnterPassword" placeholder="Re-enter Password" formControlName="reEnterPassword">
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="show-re-enter-password" (click)="togglePasswordVisibility()">
              <label class="form-check-label" for="show-re-enter-password">Show Password</label>
            </div>
            <div class="mb-3">
              <label for="role" class="form-label">Select role:</label>
              <select class="form-select" aria-label="Large select example" id="role" formControlName="role">
                <option selected>Select role</option>
                <option value="{{AccountRoleType.EVENT_ADMIN}}">Event Admin</option>
                <option value="{{AccountRoleType.SCOREKEEPER}}">Scorekeeper</option>
                <option value="{{AccountRoleType.HEAD_REFEREE}}">Head-referee</option>
                <option value="{{AccountRoleType.SCORING_REFEREE}}">Scoring-referee</option>
                <option value="{{AccountRoleType.EMCEE}}">Emcee</option>
              </select>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary" [disabled]="isLoading">{{ isEditing ? 'Update Account' : 'Create Account' }}</button>
              <button type="button" class="btn btn-secondary" *ngIf="isEditing" (click)="resetForm()">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Account List -->
    <div class="col-md-7">
      <div class="card">
        <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Existing Accounts</h5>
          <button class="btn btn-sm btn-light" (click)="loadAccounts()" [disabled]="isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
            Refresh
          </button>
        </div>
        <div class="card-body">
          <div *ngIf="isLoading && accounts.length === 0" class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Loading accounts...</p>
          </div>

          <table class="table table-striped table-hover" *ngIf="!isLoading || accounts.length > 0">
            <thead>
              <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let account of accounts">
                <td>{{account.username}}</td>
                <td>{{getRoleName(account.role)}}</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary me-2" (click)="editAccount(account)" [disabled]="isLoading">Edit</button>
                  <button class="btn btn-sm btn-outline-danger" (click)="deleteAccount(account.username)" [disabled]="isLoading">Delete</button>
                </td>
              </tr>
              <tr *ngIf="accounts.length === 0 && !isLoading">
                <td colspan="3" class="text-center">No accounts found.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
